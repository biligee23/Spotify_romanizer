<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ song_title }} by {{ artist_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
        }
        header {
            background-color: #343a40;
        }
        .container {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .container_header {
            background-color: #343a40;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .lyrics-container {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        h2, h3 {
            font-family: 'Georgia', serif;
            color: #343a40;
        }
        .lyrics {
            white-space: pre-wrap;
            font-family: 'Quicksand', sans-serif;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #495057;
        }
        .btn-success {
            margin-top: 10px;
        }
        iframe {
            border-radius: 8px;
        }
        .img-fluid {
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        /* Logout Button */
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>
    <!-- Header Section -->
    <header class="text-white py-3">
        <div class="container_header text-center">
            <h1>Japanese Song Lyrics Romanizer</h1>
            <p>(made by: Biligsaikhan Khurtsbayar)</p>
        </div>
    </header>

    <!-- Logout Button -->
    <a href="{{ url_for('logout') }}" class="btn btn-danger logout-btn">Logout</a>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row">
            <!-- Album Cover -->
            <div class="col-md-4">
                <img src="{{ image_url }}" alt="Album Cover" class="img-fluid">
            </div>

            <!-- Song Details -->
            <div class="col-md-8">
                <div class="d-flex align-items-center mb-4">
                    <a href="/" class="btn btn-success me-3">Search another song</a>
                    <h2>{{ song_title }} by {{ artist_name }}</h2>
                </div>

                <!-- YouTube Video -->
                <iframe width="100%" height="315" src="{{ youtube_url }}" allow="autoplay"></iframe>

                <!-- Lyrics Section -->
                <div class="lyrics-container mt-4">
                    <h3>Lyrics</h3>
                    <div class="lyrics">{{ lyrics }}</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
